name: Test Commit Pipeline

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "test mode: change / nochange"
        required: true
        default: "change"

permissions:
  contents: write

concurrency:
  group: test-commit-pipeline
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      # 🔥 This is the key testing control
      - name: Simulate file change (only if mode=change)
        if: ${{ github.event.inputs.mode == 'change' }}
        run: |
          echo "test $(date)" >> ai-video-generator/data/generatedTopics.json

      - name: Commit updated topics
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add ai-video-generator/data/generatedTopics.json

          if git diff --cached --quiet; then
            echo "✅ No changes to commit"
            exit 0
          fi

          git commit -m "test: update generated topics"

          # safer rebase
          git pull --rebase origin main

          git push origin HEAD:main