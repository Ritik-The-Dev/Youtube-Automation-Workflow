name: Auto Video Pipeline

on:
  schedule:
    - cron: "0 6,12,18 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: auto-video-pipeline
  cancel-in-progress: false

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Commit updated topics
        if: success()
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add ai-video-generator/data/generatedTopics.json

          git diff --cached --quiet && echo "No changes to commit" && exit 0

          git commit -m "auto: update generated topics"

          git pull --rebase origin main
          git push origin HEAD:main